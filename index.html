<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de QR - Sala individual</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 450px;
      width: 100%;
    }
    h1 {
      font-size: 1.6em;
      margin-bottom: 5px;
      color: #2c3e50;
    }
    .subtitulo {
      color: #7f8c8d;
      margin-bottom: 25px;
      font-size: 0.95em;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #555;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 1em;
      box-sizing: border-box;
    }
    input:focus {
      border-color: #3498db;
      outline: none;
    }
    .hint {
      font-size: 0.8em;
      color: #999;
      margin-top: 5px;
    }
    button {
      background: #3498db;
      color: white;
      border: none;
      padding: 14px 30px;
      font-size: 1.1em;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #2980b9;
    }
    .btn-print {
      background: #27ae60;
    }
    .btn-print:hover {
      background: #219a52;
    }
    .btn-download {
      background: #8e44ad;
    }
    .btn-download:hover {
      background: #7d3c98;
    }
    #qr-result {
      margin-top: 25px;
      padding: 20px;
      border: 1px dashed #ddd;
      border-radius: 10px;
      display: none;
    }
    #qr-code {
      display: flex;
      justify-content: center;
    }
    .sala-nombre {
      font-size: 1.3em;
      font-weight: bold;
      margin-top: 10px;
      color: #2c3e50;
      text-transform: capitalize;
    }
    .url-preview {
      font-size: 0.8em;
      color: #95a5a6;
      word-break: break-all;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Generador de QR</h1>
  <p class="subtitulo">Un QR por sala. Se imprime una vez y la imagen se actualiza semanalmente.</p>

  <div class="input-group">
    <label for="nombre-sala">Nombre exacto de la sala</label>
    <input 
      type="text" 
      id="nombre-sala" 
      placeholder="Ej: laboratorio-quimica"
      autocomplete="off"
    >
    <p class="hint">Debe coincidir con el nombre del archivo PNG (sin extension).</p>
  </div>

  <div class="input-group">
    <label for="base-url">URL del visor</label>
    <input 
      type="text" 
      id="base-url" 
      value="https://bernardobasulto.github.io/QRhorarios/ver.html?sala="
    >
    <p class="hint">Local: https://bernardobasulto.github.io/QRhorarios/ver.html?sala=</p>
  </div>

  <button id="btn-generar">Generar QR</button>
  <button class="btn-download" id="btn-descargar" style="display:none;">Descargar PNG</button>
  <button class="btn-print" id="btn-imprimir" style="display:none;">Imprimir</button>

  <div id="qr-result">
    <div id="qr-code"></div>
    <div class="sala-nombre" id="label-sala"></div>
    <div class="url-preview" id="label-url"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  var urlActual = "";

  document.getElementById("btn-generar").addEventListener("click", function() {
    var nombre = document.getElementById("nombre-sala").value.trim();
    var base = document.getElementById("base-url").value.trim();

    if (!nombre) {
      alert("Escribe el nombre de la sala");
      return;
    }
    if (!base) {
      alert("Falta la URL del visor");
      return;
    }

    urlActual = base + encodeURIComponent(nombre);

    document.getElementById("qr-code").innerHTML = "";

    new QRCode(document.getElementById("qr-code"), {
      text: urlActual,
      width: 250,
      height: 250,
      correctLevel: QRCode.CorrectLevel.M
    });

    document.getElementById("label-sala").textContent = "Sala: " + nombre.replace(/-/g, " ");
    document.getElementById("label-url").textContent = urlActual;
    document.getElementById("qr-result").style.display = "block";
    document.getElementById("btn-descargar").style.display = "inline-block";
    document.getElementById("btn-imprimir").style.display = "inline-block";
  });

  document.getElementById("btn-descargar").addEventListener("click", function() {
    var canvas = document.querySelector("#qr-code canvas");
    if (!canvas) return;
    var nombre = document.getElementById("nombre-sala").value.trim();
    var link = document.createElement("a");
    link.download = "QR-" + nombre + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });

 document.getElementById("btn-imprimir").addEventListener("click", function() {
  var canvas = document.querySelector("#qr-code canvas");
  if (!canvas) return;
  var nombre = document.getElementById("nombre-sala").value.trim();
  var imgData = canvas.toDataURL("image/png");
  
  var ventana = window.open("", "_blank");
  
  // Escribir el contenido creando elementos, no con strings
  var doc = ventana.document;
  doc.title = "QR - " + nombre;
  
  var body = doc.body;
  body.style.textAlign = "center";
  body.style.fontFamily = "Arial";
  body.style.padding = "20px";
  
  var titulo = doc.createElement("h2");
  titulo.textContent = "Sala: " + nombre.replace(/-/g, " ");
  body.appendChild(titulo);
  
  var img = doc.createElement("img");
  img.src = imgData;
  img.style.width = "350px";
  body.appendChild(img);
  
  body.appendChild(doc.createElement("br"));
  
  var urlTexto = doc.createElement("small");
  urlTexto.style.color = "gray";
  urlTexto.textContent = urlActual;
  body.appendChild(urlTexto);
  
  ventana.print();
});

  document.getElementById("nombre-sala").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      document.getElementById("btn-generar").click();
    }
  });
</script>

</body>
</html>
